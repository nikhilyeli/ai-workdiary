name: Deploy Frontend Docs to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Skip deploy when Pages is not enabled
        if: steps.pages.outcome != 'success'
        run: |
          echo "::warning::GitHub Pages is not enabled for this repository. Skipping docs deployment until Pages is configured to build with GitHub Actions."

      - name: Upload docs artifact
        if: steps.pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        if: steps.pages.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4
