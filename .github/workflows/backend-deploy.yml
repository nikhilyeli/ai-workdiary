name: Deploy Backend with GitHub Actions

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify backend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        env:
          JWT_SECRET: deploy-build-secret-deploy-build-secret-1234
        run: npm run build

  deploy:
    name: Trigger backend deploy hook
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Skip deploy hook when secret is not configured
        if: ${{ secrets.BACKEND_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "::warning::Missing repository secret BACKEND_DEPLOY_HOOK_URL."
          echo "::warning::Skipping backend deploy hook trigger."

      - name: Trigger deploy hook
        if: ${{ secrets.BACKEND_DEPLOY_HOOK_URL != '' }}
        env:
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
          BACKEND_DEPLOY_HOOK_TOKEN: ${{ secrets.BACKEND_DEPLOY_HOOK_TOKEN }}
        run: |
          if [ -n "$BACKEND_DEPLOY_HOOK_TOKEN" ]; then
            curl --fail --show-error --silent \
              -X POST \
              -H "Authorization: Bearer $BACKEND_DEPLOY_HOOK_TOKEN" \
              "$BACKEND_DEPLOY_HOOK_URL"
          else
            curl --fail --show-error --silent -X POST "$BACKEND_DEPLOY_HOOK_URL"
          fi

          echo "Backend deploy hook triggered."
